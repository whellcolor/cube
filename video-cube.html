<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Video Cube Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#0a0a0a;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

h1{color:cyan}

input{
    width:80%;
    max-width:500px;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:10px 0;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:linear-gradient(90deg, cyan, magenta);
}

textarea{
    width:90%;
    height:300px;
    margin-top:10px;
    display:none;
}
button{
    background:linear-gradient(90deg, cyan, magenta);
    font-weight:bold;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    max-width:600px;
    margin:auto;
}

.thumb{
    width:100%;
    height:80px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.thumb video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.scene{
    width:250px;
    height:250px;
    margin:20px auto;
    transform-style:preserve-3d;
    animation:spin 10s linear infinite;
}

.cube{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
}

.face{
    position:absolute;
    width:250px;
    height:250px;
}

.face video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.front{transform:translateZ(125px)}
.back{transform:rotateY(180deg) translateZ(125px)}
.right{transform:rotateY(90deg) translateZ(125px)}
.left{transform:rotateY(-90deg) translateZ(125px)}
.top{transform:rotateX(90deg) translateZ(125px)}
.bottom{transform:rotateX(-90deg) translateZ(125px)}

@keyframes spin{
    0%{transform:rotateX(0) rotateY(0)}
    100%{transform:rotateX(360deg) rotateY(360deg)}
}

.controls{
    margin:10px;
}
</style>
</head>

<body>

<h1>🎥 Video Cube Generator</h1>

<input id="url" placeholder="Masukkan URL video..." />

<div>
<button onclick="generate()">Generate</button>
<button onclick="copyCode()">Copy Code</button>
<button onclick="downloadHTML()">Download</button>
<button onclick="toggleCode()">View Code</button>
<button onclick="viewExample()">View Example</button>
  
</div></body>
  <appkit-button></appkit-button>

  <button onclick="sendTx()">Send 0.0001 ETH</button>

  <script type="module">
    import { createAppKit } from "https://esm.sh/@reown/appkit";
    import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";
    import { mainnet, arbitrum } from "https://esm.sh/@reown/appkit/networks";
    import { BrowserProvider, parseEther } from "https://esm.sh/ethers";

    const projectId = "5022875ce6ee68917f103ff9b1e3422d";

    const metadata = {
      name: "AppKit",
      description: "AppKit Example",
      url: window.location.origin,
      icons: ["https://avatars.githubusercontent.com/u/179229932"],
    };

    // CREATE APPKIT (ONLY ONCE)
    const modal = createAppKit({
      adapters: [new EthersAdapter()],
      networks: [mainnet, arbitrum],
      metadata,
      projectId,
      features: {
        analytics: true,
      },
    });

    let provider;

    // GET PROVIDER WHEN READY
    modal.subscribeProviders((state) => {
      provider = state?.eip155;
    });

    window.modal = modal;
    window.provider = provider;

    // SEND TRANSACTION FUNCTION
    window.sendTx = async function () {
      try {
        if (!provider) {
          alert("Wallet belum connect");
          return;
        }

        const ethersProvider = new BrowserProvider(provider);
        const signer = await ethersProvider.getSigner();

        const tx = await signer.sendTransaction({
          to: "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
          value: parseEther("0.0001"),
        });

        console.log("TX:", tx);
        alert("Transaction sent!");
      } catch (err) {
        console.error(err);
        alert("Transaction failed");
      }
    };
  </script>


</div>

<textarea id="output"></textarea>

<script>
let generatedCode = "";

function generate(){
    let url = document.getElementById("url").value;

    if(!url){
        alert("Masukkan URL video!");
        return;
    }

    generatedCode = `<!DOCTYPE html>
<html>
<head>
<title>3D Video Cube</title>
<style>
body{margin:0;background:black;perspective:1200px;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
.scene{width:300px;height:300px;position:relative;transform-style:preserve-3d;animation:spin 10s linear infinite}
.cube{width:100%;height:100%;position:absolute;transform-style:preserve-3d}
.face{position:absolute;width:300px;height:300px;overflow:hidden}
.face video{width:100%;height:100%;object-fit:cover}
.front{transform:translateZ(150px)}
.back{transform:rotateY(180deg) translateZ(150px)}
.right{transform:rotateY(90deg) translateZ(150px)}
.left{transform:rotateY(-90deg) translateZ(150px)}
.top{transform:rotateX(90deg) translateZ(150px)}
.bottom{transform:rotateX(-90deg) translateZ(150px)}
@keyframes spin{0%{transform:rotateX(0) rotateY(0)}100%{transform:rotateX(360deg) rotateY(360deg)}}
</style>
</head>
<body>

<div class="scene">
<div class="cube">

<div class="face front"><video autoplay loop muted><source src="${url}"></video></div>
<div class="face back"><video autoplay loop muted><source src="${url}"></video></div>
<div class="face right"><video autoplay loop muted><source src="${url}"></video></div>
<div class="face left"><video autoplay loop muted><source src="${url}"></video></div>
<div class="face top"><video autoplay loop muted><source src="${url}"></video></div>
<div class="face bottom"><video autoplay loop muted><source src="${url}"></video></div>

</div>
</div>

</body>
</html>`;

    document.getElementById("output").value = generatedCode;
    document.getElementById("output").style.display = "block";
}

function copyCode(){
    navigator.clipboard.writeText(generatedCode);
    alert("Code berhasil di-copy!");
}

function downloadHTML(){
    let blob = new Blob([generatedCode], {type:"text/html"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "video-cube.html";
    a.click();
}

function toggleCode(){
    let el = document.getElementById("output");
    el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>

<script>

/* =========================
   EXAMPLE
========================= */
function viewExample(){
    document.getElementById("cube").innerHTML = `
    <div class="face front"><video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video></div>
    <div class="face back"><video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted></video></div>
    <div class="face right"><video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video></div>
    <div class="face left"><video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted></video></div>
    <div class="face top"><video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video></div>
    <div class="face bottom"><video src="https://www.w3schools.com/html/movie.mp4" autoplay loop muted></video></div>
    `;
}

/* =========================
   GENERATE (TikTok SIMULATION)
========================= */
function generate(){
    let url = document.getElementById("url").value;

    // SIMULASI TIKTOK -> VIDEO
    let video = url.includes("tiktok")
        ? "https://www.w3schools.com/html/mov_bbb.mp4"
        : url;

    let cube = document.getElementById("cube");

    cube.innerHTML = `
    <div class="face front"><video autoplay loop muted src="${video}"></video></div>
    <div class="face back"><video autoplay loop muted src="${video}"></video></div>
    <div class="face right"><video autoplay loop muted src="${video}"></video></div>
    <div class="face left"><video autoplay loop muted src="${video}"></video></div>
    <div class="face top"><video autoplay loop muted src="${video}"></video></div>
    <div class="face bottom"><video autoplay loop muted src="${video}"></video></div>
    `;
}

/* =========================
   DRAG / FINGER ROTATION
========================= */
let scene = document.getElementById("scene");
let rotX = 0, rotY = 0;
let dragging = false;
let lastX, lastY;

scene.addEventListener("mousedown", e=>{
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
});

window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(!dragging) return;

    rotY += (e.clientX - lastX) * 0.5;
    rotX -= (e.clientY - lastY) * 0.5;

    lastX = e.clientX;
    lastY = e.clientY;

    document.getElementById("cube").style.transform =
        `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
});

/* TOUCH (HP) */
scene.addEventListener("touchmove", e=>{
    let t = e.touches[0];

    rotY += t.clientX * 0.01;
    rotX -= t.clientY * 0.01;

    document.getElementById("cube").style.transform =
        `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
});

/* =========================
   SOUND REACTIVE
========================= */
navigator.mediaDevices?.getUserMedia({audio:true})
.then(stream=>{
    let audioCtx = new AudioContext();
    let analyser = audioCtx.createAnalyser();
    let mic = audioCtx.createMediaStreamSource(stream);
    mic.connect(analyser);

    let data = new Uint8Array(analyser.frequencyBinCount);

    function soundLoop(){
        analyser.getByteFrequencyData(data);

        let volume = data.reduce((a,b)=>a+b)/data.length;

        let scale = 1 + volume/500;

        document.getElementById("cube").style.transform +=
            ` scale(${scale})`;

        requestAnimationFrame(soundLoop);
    }

    soundLoop();
})
.catch(()=>{});

/* =========================
   APK BUILDER (WEBVIEW PACKAGE)
========================= */
function exportAPK(){

    let html = document.documentElement.outerHTML;

    let apkTemplate = `
ANDROID WEBVIEW PACKAGE
========================
1. Masukkan file ini ke assets/index.html
2. Gunakan WebView load file:///android_asset/index.html
3. Build di Android Studio
========================

${html}
`;

    let blob = new Blob([apkTemplate], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "cube-apk-ready.txt";
    a.click();
}
</script>
</body>
</html>
